<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V51 - Stable Pro</title>
    <style>
        :root { --bg: #05070a; --card: #10141b; --accent: #f0b90b; --up: #00ff88; --down: #ff3b3b; --brd: #2b2f36; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .terminal { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--brd); max-width: 450px; margin: auto; }
        .switcher { display: flex; gap: 8px; margin-bottom: 15px; }
        .s-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--brd); background: #1e2329; color: #848e9c; font-weight: bold; cursor: pointer; }
        .s-btn.active { border-color: var(--accent); color: var(--accent); }
        .price-val { font-size: 48px; font-weight: 900; margin: 5px 0; text-align: center; }
        .advisor { background: rgba(240, 185, 11, 0.05); border-radius: 12px; padding: 15px; margin: 15px 0; border: 1px solid var(--brd); text-align: center; }
        .adv-action { font-size: 20px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sig-btn { width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; text-transform: uppercase; margin-bottom: 10px; }
        .buy { background: var(--up); color: #000; }
        .sell { background: var(--down); color: #fff; }
        .wait { background: #2b2f36; color: #848e9c; }
        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .lvl-box { background: #1e2329; padding: 10px; border-radius: 10px; border: 1px solid var(--brd); }
        #tv_chart { height: 350px; border-radius: 20px; border: 1px solid var(--brd); margin-top: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">GOLD PRO</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">BTC PRO</button>
        </div>
        <div id="price" class="price-val">--</div>
        <div class="advisor">
            <div style="font-size: 10px; color: #848e9c; margin-bottom: 5px;">AI ENTRY ADVISOR</div>
            <div id="adv-action" class="adv-action">SCANNING...</div>
        </div>
        <button id="signal" class="sig-btn wait">WAITING...</button>
        <div class="levels">
            <div class="lvl-box"><div style="font-size:10px; color:var(--down)">STOP LOSS</div><div id="sl" style="font-weight:700">--</div></div>
            <div class="lvl-box"><div style="font-size:10px; color:var(--up)">TARGET</div><div id="tp" style="font-weight:700">--</div></div>
        </div>
    </div>
    <div id="tv_chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        function setMode(m){ mode=m; document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn'; document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn'; loadChart(); update(); }
        function loadChart() {
            document.getElementById('tv_chart').innerHTML = '';
            new TradingView.widget({ "autosize": true, "symbol": mode==='GOLD' ? "OANDA:XAUUSD" : "BINANCE:BTCUSDT", "interval": "5", "theme": "dark", "container_id": "tv_chart", "style": "1", "hide_side_toolbar": true, "backgroundColor": "#05070a" });
        }

        async function update(){
            try {
                const sym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                const d = await r.json();
                let p = parseFloat(d.lastPrice) + (mode==='GOLD' ? 8.12 : 1.80);
                let chg = parseFloat(d.priceChangePercent);

                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2});
                const sBtn = document.getElementById('signal');
                const adv = document.getElementById('adv-action');

                // STABILITY FILTER (0.35% minimum move required)
                if(chg > 0.35) {
                    sBtn.innerHTML = 'STRONG BUY'; sBtn.className = 'sig-btn buy';
                    adv.innerHTML = '✅ ENTRY NOW'; adv.style.color = 'var(--up)';
                    document.getElementById('sl').innerText = (p - (mode==='GOLD' ? 4 : 300)).toFixed(2);
                    document.getElementById('tp').innerText = (p + (mode==='GOLD' ? 8 : 600)).toFixed(2);
                } else if(chg < -0.35) {
                    sBtn.innerHTML = 'STRONG SELL'; sBtn.className = 'sig-btn sell';
                    adv.innerHTML = '✅ ENTRY NOW'; adv.style.color = 'var(--down)';
                    document.getElementById('sl').innerText = (p + (mode==='GOLD' ? 4 : 300)).toFixed(2);
                    document.getElementById('tp').innerText = (p - (mode==='GOLD' ? 8 : 600)).toFixed(2);
                } else {
                    sBtn.innerHTML = 'WAITING FOR TREND'; sBtn.className = 'sig-btn wait';
                    adv.innerHTML = '❌ NO ENTRY'; adv.style.color = '#848e9c';
                    document.getElementById('sl').innerText = '--'; document.getElementById('tp').innerText = '--';
                }
            } catch(e) {}
        }
        loadChart(); setInterval(update, 3000); update();
    </script>
</body>
</html>
