<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX TRADER — XAUUSD / BTCUSDT</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408;
    --bg-panel: #060d14;
    --bg-card: #0a1520;
    --bg-glass: rgba(10, 21, 32, 0.85);
    --border: rgba(0, 200, 255, 0.12);
    --border-active: rgba(0, 200, 255, 0.4);
    --cyan: #00c8ff;
    --cyan-dim: rgba(0, 200, 255, 0.15);
    --green: #00ff9d;
    --green-dim: rgba(0, 255, 157, 0.12);
    --red: #ff3c5a;
    --red-dim: rgba(255, 60, 90, 0.12);
    --gold: #ffd700;
    --gold-dim: rgba(255, 215, 0, 0.12);
    --amber: #ffaa00;
    --text-primary: #e8f4ff;
    --text-secondary: rgba(232, 244, 255, 0.5);
    --text-muted: rgba(232, 244, 255, 0.25);
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,200,255,0.05) 0%, transparent 60%),
      linear-gradient(180deg, #020408 0%, #040c16 100%);
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid noise background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px 40px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-icon {
    width: 44px;
    height: 44px;
    border: 1px solid var(--cyan);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cyan-dim);
    box-shadow: 0 0 20px rgba(0,200,255,0.2), inset 0 0 20px rgba(0,200,255,0.05);
    animation: pulseIcon 3s ease-in-out infinite;
  }

  @keyframes pulseIcon {
    0%, 100% { box-shadow: 0 0 20px rgba(0,200,255,0.2), inset 0 0 20px rgba(0,200,255,0.05); }
    50% { box-shadow: 0 0 35px rgba(0,200,255,0.4), inset 0 0 20px rgba(0,200,255,0.1); }
  }

  .brand-icon svg { width: 22px; height: 22px; }

  .brand-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,200,255,0.5);
  }

  .brand-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border: 1px solid rgba(0,255,157,0.3);
    border-radius: 4px;
    background: var(--green-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 1px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .clock {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  /* ── ASSET TOGGLE ── */
  .asset-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 28px;
    width: fit-content;
  }

  .asset-btn {
    padding: 12px 32px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .asset-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .asset-btn.gold { border-right: 1px solid var(--border); }
  .asset-btn.gold::before { background: var(--gold-dim); }
  .asset-btn.btc::before { background: rgba(255,170,0,0.1); }

  .asset-btn.active.gold {
    color: var(--gold);
    text-shadow: 0 0 15px rgba(255,215,0,0.5);
  }

  .asset-btn.active.gold::before { opacity: 1; }
  .asset-btn.active.btc { color: var(--amber); text-shadow: 0 0 15px rgba(255,170,0,0.5); }
  .asset-btn.active.btc::before { opacity: 1; }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  /* ── CARD BASE ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
  }

  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── PRICE CARD ── */
  .price-card { grid-column: span 1; }

  .price-display {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 8px;
    transition: color 0.3s, text-shadow 0.3s;
  }

  .price-display.up { color: var(--green); text-shadow: 0 0 20px rgba(0,255,157,0.4); }
  .price-display.down { color: var(--red); text-shadow: 0 0 20px rgba(255,60,90,0.4); }
  .price-display.neutral { color: var(--cyan); text-shadow: 0 0 20px rgba(0,200,255,0.3); }

  .price-change {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
  }

  .change-pct {
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 600;
  }

  .change-pct.up { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,255,157,0.2); }
  .change-pct.down { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,60,90,0.2); }

  .spread-info {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* ── SIGNAL CARD ── */
  .signal-card { grid-column: span 1; }

  .signal-display {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 72px;
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    border: 1px solid;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .signal-display::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .signal-display.waiting {
    border-color: rgba(0,200,255,0.2);
    color: var(--text-secondary);
    background: transparent;
  }

  .signal-display.buy {
    border-color: var(--green);
    color: var(--green);
    text-shadow: 0 0 20px var(--green);
    box-shadow: 0 0 30px rgba(0,255,157,0.15), inset 0 0 30px rgba(0,255,157,0.05);
    animation: signalPulse 1.5s ease-in-out infinite;
  }

  .signal-display.sell {
    border-color: var(--red);
    color: var(--red);
    text-shadow: 0 0 20px var(--red);
    box-shadow: 0 0 30px rgba(255,60,90,0.15), inset 0 0 30px rgba(255,60,90,0.05);
    animation: signalPulse 1.5s ease-in-out infinite;
  }

  .signal-display.sideways {
    border-color: var(--amber);
    color: var(--amber);
    font-size: 13px;
    letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(255,170,0,0.4);
  }

  .signal-display.strong-buy {
    border-color: var(--green);
    color: var(--green);
    font-size: 20px;
    text-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,157,0.5);
    box-shadow: 0 0 50px rgba(0,255,157,0.35), inset 0 0 40px rgba(0,255,157,0.1);
    animation: strongPulseBuy 0.8s ease-in-out infinite;
  }

  .signal-display.strong-sell {
    border-color: var(--red);
    color: var(--red);
    font-size: 20px;
    text-shadow: 0 0 30px var(--red), 0 0 60px rgba(255,60,90,0.5);
    box-shadow: 0 0 50px rgba(255,60,90,0.35), inset 0 0 40px rgba(255,60,90,0.1);
    animation: strongPulseSell 0.8s ease-in-out infinite;
  }

  @keyframes signalPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  @keyframes strongPulseBuy {
    0%, 100% {
      opacity: 1;
      box-shadow: 0 0 50px rgba(0,255,157,0.35), inset 0 0 40px rgba(0,255,157,0.1);
    }
    50% {
      opacity: 0.85;
      box-shadow: 0 0 80px rgba(0,255,157,0.65), inset 0 0 60px rgba(0,255,157,0.2);
    }
  }

  @keyframes strongPulseSell {
    0%, 100% {
      opacity: 1;
      box-shadow: 0 0 50px rgba(255,60,90,0.35), inset 0 0 40px rgba(255,60,90,0.1);
    }
    50% {
      opacity: 0.85;
      box-shadow: 0 0 80px rgba(255,60,90,0.65), inset 0 0 60px rgba(255,60,90,0.2);
    }
  }

  .signal-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  /* ── VOLATILITY CARD ── */
  .vol-card { grid-column: span 1; }

  .vol-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    margin: 12px 0 6px;
    overflow: hidden;
  }

  .vol-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease, background 0.3s;
  }

  .vol-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
  }

  .vol-threshold {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .vol-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  .vol-status.active { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,255,157,0.2); }
  .vol-status.inactive { background: rgba(255,170,0,0.1); color: var(--amber); border: 1px solid rgba(255,170,0,0.2); }

  /* ── CANDLE TREND ROW ── */
  .candle-card {
    grid-column: span 2;
    display: flex;
    flex-direction: column;
  }

  .candle-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .candle-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .candle-label-sm {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: center;
  }

  .candle-visual {
    height: 56px;
    border-radius: 6px;
    border: 1px solid;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    position: relative;
    transition: all 0.3s;
  }

  .candle-visual.green {
    border-color: rgba(0,255,157,0.4);
    background: rgba(0,255,157,0.05);
  }

  .candle-visual.red {
    border-color: rgba(255,60,90,0.4);
    background: rgba(255,60,90,0.05);
  }

  .candle-visual.neutral {
    border-color: var(--border);
    background: transparent;
  }

  .candle-ohlc {
    font-family: var(--font-mono);
    font-size: 10px;
    text-align: center;
  }

  .candle-arrow {
    font-size: 16px;
    font-weight: bold;
  }

  .candle-visual.green .candle-arrow { color: var(--green); }
  .candle-visual.red .candle-arrow { color: var(--red); }
  .candle-visual.neutral .candle-arrow { color: var(--text-muted); }

  .candle-close-val {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-secondary);
  }

  .trend-verdict {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .trend-verdict.confirmed-bull { border-color: rgba(0,255,157,0.3); background: var(--green-dim); color: var(--green); }
  .trend-verdict.confirmed-bear { border-color: rgba(255,60,90,0.3); background: var(--red-dim); color: var(--red); }
  .trend-verdict.unconfirmed { border-color: var(--border); background: transparent; color: var(--text-muted); }

  /* ── RISK CARD ── */
  .risk-card { grid-column: span 1; }

  .risk-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .risk-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid;
  }

  .risk-item.entry { border-color: rgba(0,200,255,0.2); background: var(--cyan-dim); }
  .risk-item.sl { border-color: rgba(255,60,90,0.2); background: var(--red-dim); }
  .risk-item.tp { border-color: rgba(0,255,157,0.2); background: var(--green-dim); }

  .risk-item-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .risk-item-value {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
  }

  .risk-item.entry .risk-item-value { color: var(--cyan); }
  .risk-item.sl .risk-item-value { color: var(--red); }
  .risk-item.tp .risk-item-value { color: var(--green); }

  .rr-badge {
    text-align: center;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(0,200,255,0.04);
  }

  /* ── SETTINGS PANEL ── */
  .settings-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .settings-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
  }

  .settings-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .settings-title::before { content: '⚙'; font-size: 12px; }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .setting-item label {
    display: block;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .setting-item input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--cyan);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .setting-item input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 10px rgba(0,200,255,0.1);
  }

  /* ── TRADINGVIEW SECTION ── */
  .chart-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }

  .chart-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-symbol-badge {
    padding: 3px 10px;
    border: 1px solid var(--border-active);
    border-radius: 4px;
    background: var(--cyan-dim);
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 1px;
  }

  #tv-chart-container { height: 480px; }

  /* ── BOTTOM STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0 0;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .status-items {
    display: flex;
    gap: 24px;
  }

  .status-item span { color: var(--text-secondary); }

  /* ── DECORATIVE CORNER ── */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 40px; height: 40px;
    background: linear-gradient(135deg, transparent 50%, rgba(0,200,255,0.04) 50%);
    border-top-left-radius: 4px;
  }

  /* ── FLICKER ANIMATION ── */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.8; }
  }

  .price-display { animation: flicker 8s infinite; }

  /* ── UPDATE FLASH ── */
  @keyframes flashUpdate {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .flash { animation: flashUpdate 0.3s ease; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr 1fr; }
    .candle-card { grid-column: span 2; }
    .risk-card { grid-column: span 2; }
    .settings-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00c8ff" stroke-width="1.5">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">APEX TRADER</div>
        <div class="brand-sub">AGGRESSIVE MOMENTUM ENGINE v4.0</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE FEED</div>
      <div class="clock" id="clock">--:--:-- UTC</div>
    </div>
  </header>
