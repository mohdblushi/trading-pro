<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX TRADER - FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #010609; color: #ddeeff; font-family: sans-serif; margin: 0; padding: 15px; }
        .card { background: #070f18; border: 1px solid #00d4ff33; border-radius: 10px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .label { font-family: 'Orbitron'; color: #00d4ff; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px; }
        .price { font-family: 'Share Tech Mono'; font-size: 42px; font-weight: bold; color: #fff; margin: 10px 0; }
        .ratio-box { border-top: 2px solid #ffd000; }
        .signal { font-family: 'Orbitron'; font-size: 24px; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .buy { color: #00ff9d; text-shadow: 0 0 10px #00ff9d; }
        .sell { color: #ff2e55; text-shadow: 0 0 10px #ff2e55; }
        .wait { color: #ff9500; }
    </style>
</head>
<body>

    <div class="card">
        <div class="label">BITCOIN (BTCUSDT)</div>
        <div id="btc-price" class="price">LOADING...</div>
        <div id="btc-sig" class="signal wait">ANALYZING...</div>
    </div>

    <div class="card ratio-box">
        <div class="label" style="color:#ffd000">BTCXAU RATIO (MT5 STYLE)</div>
        <div id="ratio-val" class="price" style="font-size: 36px;">--.-----</div>
        <div id="ratio-sig" class="signal wait">FAST MODE ACTIVE</div>
    </div>

    <script>
        async function updateData() {
            try {
                // Fetch BTC and Gold from Binance
                const [btcRes, xauRes] = await Promise.all([
                    fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'),
                    fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT') // PAXG is Gold token
                ]);

                const btcData = await btcRes.json();
                const xauData = await xauRes.json();

                const btc = parseFloat(btcData.price);
                const xau = parseFloat(xauData.price);

                // 1. Update BTC Price
                document.getElementById('btc-price').innerText = btc.toFixed(1);

                // 2. Calculate Ratio (BTC / Gold)
                const ratio = btc / xau;
                document.getElementById('ratio-val').innerText = ratio.toFixed(5);

                // 3. Fast Signal Logic (Simple Trend)
                const btcSig = document.getElementById('btc-sig');
                if (btc > 74500) { // Example logic
                    btcSig.innerText = "STRONG BUY";
                    btcSig.className = "signal buy";
                } else {
                    btcSig.innerText = "WAITING";
                    btcSig.className = "signal wait";
                }

            } catch (e) {
                console.log("Error fetching data...");
            }
        }

        setInterval(updateData, 2000); // 2 Second Refresh
        updateData();
    </script>
</body>
</html>
