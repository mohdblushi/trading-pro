<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V50 - Ultra Fast</title>
    <style>
        :root { --bg: #05070a; --card: #10141b; --accent: #f0b90b; --up: #00ff88; --down: #ff3b3b; --brd: #2b2f36; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; }
        .terminal { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--brd); max-width: 450px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .price-val { font-size: 52px; font-weight: 900; margin: 10px 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        
        .advisor { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .adv-status { font-size: 11px; color: #848e9c; text-transform: uppercase; letter-spacing: 1px; }
        .adv-action { font-size: 20px; font-weight: 800; margin-top: 4px; }
        
        .sig-btn { width: 100%; padding: 20px; border-radius: 15px; font-size: 22px; font-weight: 900; border: none; text-transform: uppercase; transition: 0.2s; cursor: default; }
        .buy { background: linear-gradient(135deg, #00c853, #00e676); color: #000; box-shadow: 0 5px 15px rgba(0,200,83,0.3); }
        .sell { background: linear-gradient(135deg, #d50000, #ff1744); color: #fff; box-shadow: 0 5px 15px rgba(213,0,0,0.3); }
        .wait { background: #1e2329; color: #5e6673; font-size: 16px; border: 1px solid var(--brd); }

        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .lvl-box { background: #1e2329; padding: 12px; border-radius: 12px; border: 1px solid var(--brd); }
        .lvl-label { font-size: 10px; color: #848e9c; font-weight: bold; margin-bottom: 5px; }
        .lvl-val { font-size: 16px; font-weight: 700; }
        #tv_chart { height: 380px; border-radius: 20px; border: 1px solid var(--brd); margin-top: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="terminal">
        <div id="price" class="price-val">FETCHING...</div>
        <div class="advisor">
            <div class="adv-status">AI Real-Time Advisor</div>
            <div id="adv-action" class="adv-action">🔄 SYNCING...</div>
        </div>
        <button id="signal" class="sig-btn wait">ANALYZING BTC TREND...</button>
        <div class="levels">
            <div class="lvl-box"><div class="lvl-label" style="color:var(--down)">STOP LOSS</div><div id="sl" class="lvl-val">--</div></div>
            <div class="lvl-box"><div class="lvl-label" style="color:var(--up)">TARGET</div><div id="tp" class="lvl-val">--</div></div>
        </div>
    </div>
    <div id="tv_chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let prevPrice = 0;
        function loadChart() {
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "tv_chart", "style": "1", "hide_side_toolbar": true, "backgroundColor": "#05070a" });
        }

        async function update(){
            try {
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT`);
                const d = await r.json();
                let p = parseFloat(d.price) + 1.80; // MT5 Sync Offset

                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2});
                
                const sBtn = document.getElementById('signal');
                const adv = document.getElementById('adv-action');
                
                // --- ULTRA FAST REACTION LOGIC ---
                if (prevPrice > 0) {
                    let diff = p - prevPrice;
                    
                    // Agar price pichle 2 sec se gir raha hai
                    if (diff < -5) { 
                        sBtn.innerHTML = '⚠️ MARKET DROPPING'; sBtn.className = 'sig-btn wait';
                        adv.innerHTML = '❌ DO NOT BUY'; adv.style.color = '#ff3b3b';
                    } 
                    // Agar price pichle 2 sec se fast upar ja raha hai
                    else if (diff > 5) {
                        sBtn.innerHTML = '🚀 STRONG BUY'; sBtn.className = 'sig-btn buy';
                        adv.innerHTML = '✅ ENTRY NOW'; adv.style.color = '#00ff88';
                        document.getElementById('sl').innerText = (p - 250).toFixed(2);
                        document.getElementById('tp').innerText = (p + 500).toFixed(2);
                    }
                }
                prevPrice = p;
            } catch(e) {}
        }
        loadChart(); setInterval(update, 2000); update();
    </script>
</body>
</html>
