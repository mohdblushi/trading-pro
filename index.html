<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX TRADER — AGGRESSIVE v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408; --bg-panel: #060d14; --bg-card: #0a1520;
    --cyan: #00c8ff; --green: #00ff9d; --red: #ff3c5a; --amber: #ffaa00;
    --text-primary: #e8f4ff; --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif; --font-body: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg-void); color: var(--text-primary);
    font-family: var(--font-body); margin: 0; overflow-x: hidden;
  }

  .wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; z-index: 1; position: relative; }
  
  /* Header & UI Base */
  .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,200,255,0.2); padding-bottom: 15px; margin-bottom: 20px; }
  .brand-name { font-family: var(--font-display); font-size: 20px; color: var(--cyan); letter-spacing: 2px; }

  .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
  .card { background: var(--bg-card); border: 1px solid rgba(0,200,255,0.1); border-radius: 10px; padding: 15px; position: relative; }

  /* Signal Styles */
  .signal-display {
    height: 80px; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 22px; font-weight: 900;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
  }

  .strong-buy { 
    color: var(--green); border-color: var(--green); 
    box-shadow: 0 0 30px rgba(0,255,157,0.3); animation: pulse-green 0.8s infinite;
  }
  .strong-sell { 
    color: var(--red); border-color: var(--red); 
    box-shadow: 0 0 30px rgba(255,60,90,0.3); animation: pulse-red 0.8s infinite;
  }
  .waiting { color: grey; }

  @keyframes pulse-green { 0% { box-shadow: 0 0 10px rgba(0,255,157,0.2); } 50% { box-shadow: 0 0 40px rgba(0,255,157,0.6); } 100% { box-shadow: 0 0 10px rgba(0,255,157,0.2); } }
  @keyframes pulse-red { 0% { box-shadow: 0 0 10px rgba(255,60,90,0.2); } 50% { box-shadow: 0 0 40px rgba(255,60,90,0.6); } 100% { box-shadow: 0 0 10px rgba(255,60,90,0.2); } }

  .risk-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-family: var(--font-mono); }
  .price-large { font-family: var(--font-display); font-size: 32px; text-align: center; margin: 10px 0; }

  /* Inputs */
  .settings-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: var(--bg-panel); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
  input { background: #000; border: 1px solid #333; color: var(--cyan); padding: 5px; border-radius: 4px; width: 100%; }

  #tv-chart { height: 450px; background: #060d14; border-radius: 10px; overflow: hidden; }
</style>
</head>
<body>

<div class="wrapper">
  <header class="header">
    <div class="brand-name">APEX TRADER v4.0</div>
    <div id="clock" style="font-family: var(--font-mono);">00:00:00 UTC</div>
  </header>

  <div class="settings-bar">
    <div><label>Offset XAU</label><input type="number" id="offGold" value="0" onchange="updateSet()"></div>
    <div><label>Offset BTC</label><input type="number" id="offBtc" value="0" onchange="updateSet()"></div>
    <div><label>SL Pips</label><input type="number" id="slDist" value="15" onchange="updateSet()"></div>
    <div><label>Vol %</label><input type="number" id="vThr" value="0.30" step="0.01" onchange="updateSet()"></div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div style="font-size: 12px; color: var(--cyan);">LIVE PRICE</div>
      <div id="priceOut" class="price-large">0.00</div>
      <div id="changeOut" style="text-align: center; font-family: var(--font-mono);">0.00%</div>
    </div>

    <div class="card">
      <div style="font-size: 12px; color: var(--cyan);">MOMENTUM SIGNAL</div>
      <div id="sigOut" class="signal-display waiting">SCANNING</div>
      <div id="sigSub" style="font-size: 10px; text-align: center; margin-top: 5px; color: #666;">Waiting for trend...</div>
    </div>

    <div class="card">
      <div style="font-size: 12px; color: var(--cyan);">RISK (1:2)</div>
      <div class="risk-item"><span>ENTRY</span><span id="rEnt">-</span></div>
      <div class="risk-item" style="color: var(--red);"><span>S/L</span><span id="rSl">-</span></div>
      <div class="risk-item" style="color: var(--green);"><span>T/P</span><span id="rTp">-</span></div>
    </div>
  </div>

  <div id="tv-chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  let asset = 'XAUUSDT';
  let lastSignal = null;
  let config = { goldOff: 0, btcOff: 0, sl: 15, vol: 0.30 };

  function updateSet() {
    config.goldOff = parseFloat(document.getElementById('offGold').value);
    config.btcOff = parseFloat(document.getElementById('offBtc').value);
    config.sl = parseFloat(document.getElementById('slDist').value);
    config.vol = parseFloat(document.getElementById('vThr').value);
  }

  function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(type === 'buy' ? 880 : 330, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  }

  async function engine() {
    try {
      const resp = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${asset}`);
      const data = await resp.json();
      const off = asset.includes('XAU') ? config.goldOff : config.btcOff;
      const price = parseFloat(data.lastPrice) + off;
      const vol = Math.abs(parseFloat(data.priceChangePercent));

      document.getElementById('priceOut').innerText = price.toFixed(2);
      document.getElementById('changeOut').innerText = data.priceChangePercent + "%";

      // Candle Logic
      const cResp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${asset}&interval=1m&limit=4`);
      const k = await cResp.json();
      const candles = k.map(x => ({ open: parseFloat(x[1]), close: parseFloat(x[4]) }));
      
      const req = vol > 0.80 ? 2 : 3; // Aggressive mode
      const slice = candles.slice(-req);
      
      const isUp = slice.every(c => c.close > c.open) && slice[slice.length-1].close > slice[slice.length-2].close;
      const isDown = slice.every(c => c.close < c.open) && slice[slice.length-1].close < slice[slice.length-2].close;

      const sigEl = document.getElementById('sigOut');
      if (vol < config.vol) {
        sigEl.innerText = "SIDEWAYS"; sigEl.className = "signal-display waiting";
      } else if (isUp) {
        sigEl.innerText = "🔥 STRONG BUY"; sigEl.className = "signal-display strong-buy";
        if(lastSignal !== 'buy') { playSound('buy'); lastSignal = 'buy'; calcRisk(price, 'buy'); }
      } else if (isDown) {
        sigEl.innerText = "🔥 STRONG SELL"; sigEl.className = "signal-display strong-sell";
        if(lastSignal !== 'sell') { playSound('sell'); lastSignal = 'sell'; calcRisk(price, 'sell'); }
      } else {
        sigEl.innerText = "SCANNING"; sigEl.className = "signal-display waiting";
        lastSignal = null;
      }
    } catch (e) { console.error(e); }
  }

  function calcRisk(p, d) {
    const pip = asset.includes('XAU') ? 0.1 : 1;
    const s = d === 'buy' ? p - (config.sl * pip) : p + (config.sl * pip);
    const t = d === 'buy' ? p + (config.sl * 2 * pip) : p - (config.sl * 2 * pip);
    document.getElementById('rEnt').innerText = p.toFixed(2);
    document.getElementById('rSl').innerText = s.toFixed(2);
    document.getElementById('rTp').innerText = t.toFixed(2);
  }

  new TradingView.widget({
    "container_id": "tv-chart", "symbol": "OANDA:XAUUSD", "interval": "1", "theme": "dark", "style": "1", "width": "100%", "height": 450
  });

  setInterval(engine, 2000);
  setInterval(() => { document.getElementById('clock').innerText = new Date().toUTCString().split(' ')[4] + " UTC"; }, 1000);
</script>
</body>
</html>
