<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V41 - AI Intelligence</title>
    <style>
        :root { --bg: #000000; --card: #0b0b0b; --accent: #ffcc00; --up: #00ff88; --down: #ff3333; --brd: #222; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .terminal { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--brd); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .switcher { display: flex; gap: 10px; margin-bottom: 20px; background: #151515; padding: 5px; border-radius: 15px; }
        .s-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; color: #666; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .s-btn.active { background: var(--accent); color: black; }
        .price-val { font-size: 55px; font-weight: 800; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .sig-box { padding: 18px; border-radius: 16px; font-size: 24px; font-weight: 900; margin: 15px 0; border: 2px solid var(--brd); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .buy { color: var(--up); border-color: var(--up); background: rgba(0, 255, 136, 0.1); }
        .sell { color: var(--down); border-color: var(--down); background: rgba(255, 51, 51, 0.1); }
        .wait { color: #888; border-color: var(--brd); font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .box { background: #151515; padding: 15px; border-radius: 15px; border: 1px solid #222; text-align: left; }
        .label { font-size: 11px; color: #555; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .val { font-size: 17px; font-weight: 700; color: #eee; }
        #tv_chart { height: 420px; border-radius: 24px; border: 1px solid var(--brd); margin-top: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">GOLD PRO</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">BTC PRO</button>
        </div>
        <div id="price" class="price-val">0.00</div>
        <div id="signal" class="sig-box wait">AI ANALYZING MARKET...</div>
        <div class="grid">
            <div class="box"><div class="label" style="color:var(--up)">ENTRY POINT</div><div id="entry" class="val">--</div></div>
            <div class="box"><div class="label" style="color:var(--down)">STOP LOSS</div><div id="sl" class="val">--</div></div>
            <div class="box"><div class="label" style="color:var(--accent)">TARGET 1</div><div id="tp1" class="val">--</div></div>
            <div class="box"><div class="label" style="color:var(--accent)">TARGET 2</div><div id="tp2" class="val">--</div></div>
        </div>
    </div>
    <div id="tv_chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        function setMode(m){ mode=m; document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn'; document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn'; loadChart(); update(); }
        function loadChart() {
            document.getElementById('tv_chart').innerHTML = '';
            new TradingView.widget({ "autosize": true, "symbol": mode==='GOLD' ? "OANDA:XAUUSD" : "BINANCE:BTCUSDT", "interval": "5", "theme": "dark", "container_id": "tv_chart", "style": "1", "toolbar_bg": "#000000", "enable_publishing": false, "hide_side_toolbar": true, "backgroundColor": "#000000" });
        }

        async function update(){
            try {
                const sym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                const d = await r.json();
                let p = parseFloat(d.lastPrice);
                let chg = parseFloat(d.priceChangePercent);

                // Manual Offset to sync with your MT5/TradingView screenshot
                if(mode==='GOLD') p += 8.12; else p += 1.80;

                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
                const sBox = document.getElementById('signal');
                let ent, sl, tp1, tp2;

                // --- AI SMART LOGIC ---
                // Agar change positive hai aur price momentum up hai
                if(chg > 0.15) { 
                    sBox.innerHTML = '🚀 STRONG BUY'; sBox.className = 'sig-box buy';
                    ent = p; sl = ent - (mode==='GOLD' ? 4 : 350); tp1 = ent + (mode==='GOLD' ? 6 : 600); tp2 = ent + (mode==='GOLD' ? 12 : 1200);
                } 
                // Agar change negative hai aur girawat shuru ho chuki hai
                else if(chg < -0.15) { 
                    sBox.innerHTML = '📉 STRONG SELL'; sBox.className = 'sig-box sell';
                    ent = p; sl = ent + (mode==='GOLD' ? 4 : 350); tp1 = ent - (mode==='GOLD' ? 6 : 600); tp2 = ent - (mode==='GOLD' ? 12 : 1200);
                } 
                else {
                    sBox.innerHTML = '⏳ WAITING FOR TREND CONFIRMATION...'; sBox.className = 'sig-box wait';
                    ent = sl = tp1 = tp2 = 0;
                }

                document.getElementById('entry').innerText = ent === 0 ? '--' : ent.toFixed(2);
                document.getElementById('sl').innerText = sl === 0 ? '--' : sl.toFixed(2);
                document.getElementById('tp1').innerText = tp1 === 0 ? '--' : tp1.toFixed(2);
                document.getElementById('tp2').innerText = tp2 === 0 ? '--' : tp2.toFixed(2);
            } catch(e) {}
        }
        loadChart(); setInterval(update, 2000); update();
    </script>
</body>
</html>
