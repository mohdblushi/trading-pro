<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V60 - Final Decision</title>
    <style>
        :root { --bg: #000; --card: #0c0c0c; --up: #00ff88; --down: #ff3b3b; --wait: #444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .main-container { max-width: 400px; margin: auto; background: var(--card); border: 2px solid #222; border-radius: 30px; padding: 30px; text-align: center; }
        .price { font-size: 60px; font-weight: 900; margin-bottom: 20px; color: #fff; }
        
        /* Decision Box */
        .decision-box { padding: 25px; border-radius: 20px; font-size: 28px; font-weight: 900; margin-bottom: 20px; transition: 0.5s; }
        .buy { background: rgba(0, 255, 136, 0.15); color: var(--up); border: 2px solid var(--up); }
        .sell { background: rgba(255, 59, 59, 0.15); color: var(--down); border: 2px solid var(--down); }
        .neutral { background: #1a1a1a; color: var(--wait); border: 2px solid #333; }

        .info-text { font-size: 14px; color: #888; margin-bottom: 25px; line-height: 1.5; }
        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lvl { background: #151515; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .label { font-size: 11px; color: #555; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 18px; font-weight: 700; }
        
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #111; color: #666; font-weight: bold; cursor: pointer; }
        .m-btn.active { border-color: #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="mode-switch">
            <button id="g-btn" class="m-btn active" onclick="setMode('GOLD')">GOLD</button>
            <button id="b-btn" class="m-btn" onclick="setMode('BTC')">BITCOIN</button>
        </div>
        <div id="price" class="price">0.00</div>
        
        <div id="decision" class="decision-box neutral">AI ANALYZING...</div>
        
        <div id="hint" class="info-text">Market is sideways. <br> Do not take any trade right now.</div>

        <div class="levels">
            <div class="lvl"><div class="label" style="color:var(--down)">STOP LOSS</div><div id="sl" class="val">--</div></div>
            <div class="lvl"><div class="label" style="color:var(--up)">PROFIT TARGET</div><div id="tp" class="val">--</div></div>
        </div>
    </div>

    <script>
        let mode = 'GOLD';
        function setMode(m){ mode=m; document.getElementById('g-btn').className = m==='GOLD'?'m-btn active':'m-btn'; document.getElementById('b-btn').className = m==='BTC'?'m-btn active':'m-btn'; update(); }

        async function update(){
            try {
                const sym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                const d = await r.json();
                let p = parseFloat(d.lastPrice) + (mode==='GOLD' ? 8.12 : 1.80);
                let chg = parseFloat(d.priceChangePercent);

                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2});
                
                const dec = document.getElementById('decision');
                const hint = document.getElementById('hint');
                
                // --- HARD FILTER LOGIC (0.50% Trend Confirmation) ---
                if(chg > 0.50) {
                    dec.innerHTML = "✅ PERFECT BUY"; dec.className = "decision-box buy";
                    hint.innerHTML = "Trend is Strong Up. <br> Safe to Enter Buy Position Now.";
                    document.getElementById('sl').innerText = (p - (mode==='GOLD' ? 5 : 450)).toFixed(2);
                    document.getElementById('tp').innerText = (p + (mode==='GOLD' ? 10 : 900)).toFixed(2);
                } 
                else if(chg < -0.50) {
                    dec.innerHTML = "🚨 PERFECT SELL"; dec.className = "decision-box sell";
                    hint.innerHTML = "Trend is Strong Down. <br> Safe to Enter Sell Position Now.";
                    document.getElementById('sl').innerText = (p + (mode==='GOLD' ? 5 : 450)).toFixed(2);
                    document.getElementById('tp').innerText = (p - (mode==='GOLD' ? 10 : 900)).toFixed(2);
                } 
                else {
                    dec.innerHTML = "⏳ NO TRADE"; dec.className = "decision-box neutral";
                    hint.innerHTML = "Market is not clear. <br> Please wait for a bigger move.";
                    document.getElementById('sl').innerText = "--";
                    document.getElementById('tp').innerText = "--";
                }
            } catch(e) {}
        }
        setInterval(update, 5000); update();
    </script>
</body>
</html>
