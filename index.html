<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V22 - Perfect Sync</title>
    <style>
        :root { --bg:#06080c; --card:#11151c; --gold:#f0b90b; --green:#00ffaa; --red:#ff3b5c; }
        body { background:var(--bg); color:white; font-family:sans-serif; margin:0; padding:10px; }
        .dashboard { background:var(--card); border-radius:20px; padding:20px; border:1px solid #1c212d; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .switcher { display:flex; gap:8px; margin-bottom:15px; }
        .s-btn { flex:1; padding:12px; border-radius:10px; border:1px solid #333; background:#1a1f26; color:white; font-weight:bold; cursor:pointer; font-size:12px; }
        .s-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(240,185,11,0.1); }
        .price { font-size:42px; font-weight:900; margin:10px 0; letter-spacing:-1px; }
        .sig-box { padding:20px; border-radius:15px; font-size:22px; font-weight:bold; margin:10px 0; border:2px solid #2d3748; }
        .buy { color:var(--green); border-color:var(--green); background:rgba(0,255,170,0.05); }
        .sell { color:var(--red); border-color:var(--red); background:rgba(255,59,92,0.05); }
        .wait { color:#aaa; border-color:#444; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .l-box { background:#1c212d; padding:12px; border-radius:12px; font-size:14px; border-bottom:3px solid #333; }
        #tv-chart { height:450px; border-radius:20px; margin-top:15px; border:1px solid #1c212d; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">🔱 GOLD PRO</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">₿ BTC PRO</button>
        </div>
        <div id="price" class="price">--</div>
        <div id="signal" class="sig-box wait">⏳ LOADING SYNC...</div>
        <div class="grid">
            <div class="l-box">SL: <span id="sl" style="color:var(--red); font-weight:bold;">--</span></div>
            <div class="l-box">TP: <span id="tp" style="color:var(--green); font-weight:bold;">--</span></div>
        </div>
    </div>
    <div id="tv-chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        
        function setMode(m){ 
            mode=m; 
            document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn';
            document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn';
            loadChart();
            update(); 
        }

        function loadChart() {
            document.getElementById('tv-chart').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": mode==='GOLD' ? "BINANCE:PAXGUSDT" : "BINANCE:BTCUSDT",
                "interval": "5", "theme": "dark", "container_id": "tv-chart", "style": "1", "timezone": "Etc/UTC"
            });
        }

        async function update(){
            try{
                const sym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                const d = await r.json();
                let p = parseFloat(d.price);
                
                // Perfect Sync Correction
                if(mode==='GOLD') p += 19.65; 
                
                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
                
                // Signal Logic
                const stats = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                const sData = await stats.json();
                const change = parseFloat(sData.priceChangePercent);
                const sBox = document.getElementById('signal');

                if(change > 0.15) { sBox.innerText = '🔥 STRONG BUY ' + mode; sBox.className = 'sig-box buy'; }
                else if(change < -0.15) { sBox.innerText = '⚠️ STRONG SELL ' + mode; sBox.className = 'sig-box sell'; }
                else { sBox.innerText = '⏳ WAIT FOR SIGNAL'; sBox.className = 'sig-box wait'; }

                let gap = mode==='GOLD' ? 5.0 : (p * 0.005);
                document.getElementById('sl').innerText = (p-gap).toFixed(2);
                document.getElementById('tp').innerText = (p+(gap*1.5)).toFixed(2);
            } catch(e){ console.log(e); }
        }

        loadChart(); setInterval(update, 2000); update();
    </script>
</body>
</html>
