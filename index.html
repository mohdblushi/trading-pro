<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V45 - AI Advisor</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #ffcc00; --up: #00ff88; --down: #ff3333; --brd: #30363d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .terminal { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--brd); text-align: center; max-width: 450px; margin: auto; }
        .switcher { display: flex; gap: 10px; margin-bottom: 15px; }
        .s-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--brd); background: #21262d; color: #8b949e; font-weight: bold; cursor: pointer; }
        .s-btn.active { border-color: var(--accent); color: var(--accent); background: #1c2128; }
        .price-val { font-size: 50px; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        
        /* AI Advisor Box */
        .advisor { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; margin: 15px 0; border: 1px solid var(--brd); position: relative; overflow: hidden; }
        .advisor::before { content: ''; position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: var(--accent); }
        .adv-status { font-size: 14px; color: #8b949e; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .adv-action { font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .sig-btn { width: 100%; padding: 22px; border-radius: 15px; font-size: 24px; font-weight: 900; margin: 10px 0; border: 2px solid var(--brd); text-transform: uppercase; transition: 0.3s; }
        .buy { color: var(--up); border-color: var(--up); background: rgba(0, 255, 136, 0.05); }
        .sell { color: var(--down); border-color: var(--down); background: rgba(255, 51, 51, 0.05); }
        .wait { color: #555; border-color: var(--brd); font-size: 18px; }

        .levels { display: flex; gap: 10px; margin-top: 15px; }
        .lvl-box { flex: 1; background: #21262d; padding: 12px; border-radius: 12px; border: 1px solid var(--brd); }
        .lvl-label { font-size: 11px; color: #8b949e; font-weight: bold; margin-bottom: 5px; }
        .lvl-val { font-size: 16px; font-weight: bold; }
        #tv_chart { height: 380px; border-radius: 20px; border: 1px solid var(--brd); margin-top: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">GOLD PRO</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">BTC PRO</button>
        </div>
        <div id="price" class="price-val">--</div>
        
        <div class="advisor">
            <div class="adv-status">AI Entry Advisor</div>
            <div id="adv-action" class="adv-action">⏳ ANALYZING...</div>
        </div>

        <button id="signal" class="sig-btn wait">SEARCHING TREND...</button>
        
        <div class="levels">
            <div class="lvl-box"><div class="lvl-label" style="color:var(--down)">SL</div><div id="sl" class="lvl-val">--</div></div>
            <div class="lvl-box"><div class="lvl-label" style="color:var(--up)">TP</div><div id="tp" class="lvl-val">--</div></div>
        </div>
    </div>
    <div id="tv_chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        function setMode(m){ mode=m; document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn'; document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn'; loadChart(); update(); }
        function loadChart() {
            document.getElementById('tv_chart').innerHTML = '';
            new TradingView.widget({ "autosize": true, "symbol": mode==='GOLD' ? "OANDA:XAUUSD" : "BINANCE:BTCUSDT", "interval": "5", "theme": "dark", "container_id": "tv_chart", "style": "1", "hide_side_toolbar": true, "backgroundColor": "#0d1117" });
        }

        async function update(){
            try {
                const sym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                const d = await r.json();
                let p = parseFloat(d.lastPrice);
                let chg = parseFloat(d.priceChangePercent);

                if(mode==='GOLD') p += 8.12; else p += 1.80;

                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
                
                const sBtn = document.getElementById('signal');
                const adv = document.getElementById('adv-action');
                let sl, tp;

                // --- ADVANCED FILTER LOGIC ---
                // Strong Confirmation (Only when trend is solid)
                if(chg > 0.40) { 
                    sBtn.innerHTML = 'STRONG BUY ' + mode; sBtn.className = 'sig-btn buy';
                    adv.innerHTML = '✅ ENTRY NOW'; adv.style.color = '#00ff88';
                    sl = p - (mode==='GOLD' ? 5.5 : 400); tp = p + (mode==='GOLD' ? 11 : 800);
                } else if(chg < -0.40) {
                    sBtn.innerHTML = 'STRONG SELL ' + mode; sBtn.className = 'sig-btn sell';
                    adv.innerHTML = '✅ ENTRY NOW'; adv.style.color = '#ff3333';
                    sl = p + (mode==='GOLD' ? 5.5 : 400); tp = p - (mode==='GOLD' ? 11 : 800);
                } else {
                    sBtn.innerHTML = 'WAITING FOR TREND...'; sBtn.className = 'sig-btn wait';
                    adv.innerHTML = '❌ NO ENTRY'; adv.style.color = '#8b949e';
                    sl = 0; tp = 0;
                }

                document.getElementById('sl').innerText = sl === 0 ? '--' : sl.toFixed(2);
                document.getElementById('tp').innerText = tp === 0 ? '--' : tp.toFixed(2);
            } catch(e) {}
        }
        loadChart(); setInterval(update, 2000); update();
    </script>
</body>
</html>
