<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V31 - Vantage Edition</title>
    <style>
        :root { 
            --bg-main: #020617; 
            --card-bg: #0f172a; 
            --accent-gold: #f59e0b; 
            --neon-green: #10b981; 
            --neon-red: #ef4444; 
            --text-dim: #94a3b8;
            --border: #1e293b;
        }

        body { 
            background: var(--bg-main); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 10px;
        }

        .terminal-container { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid var(--border); 
            text-align: center; 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .switcher { display: flex; gap: 8px; margin-bottom: 15px; }
        .s-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); 
            background: #1e293b; color: var(--text-dim); font-weight: 700; cursor: pointer; 
            font-size: 10px; text-transform: uppercase;
        }
        .s-btn.active { 
            border-color: var(--accent-gold); color: var(--accent-gold); 
            background: rgba(245, 158, 11, 0.1);
        }

        .price-display { 
            font-size: 52px; font-weight: 800; margin: 10px 0; 
            letter-spacing: -1.5px;
        }

        .signal-indicator { 
            padding: 15px; border-radius: 12px; font-size: 20px; font-weight: 800; 
            margin: 10px 0; border: 2px solid var(--border);
        }
        .buy { color: var(--neon-green); border-color: var(--neon-green); background: rgba(16, 185, 129, 0.1); }
        .sell { color: var(--neon-red); border-color: var(--neon-red); background: rgba(239, 68, 68, 0.1); }
        .wait { color: var(--text-dim); border-color: var(--border); }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .meta-box { 
            background: rgba(30, 41, 59, 0.4); padding: 12px; border-radius: 12px; 
            border: 1px solid var(--border); text-align: left;
        }
        .meta-label { font-size: 9px; color: var(--text-dim); font-weight: 700; margin-bottom: 3px; }
        .meta-val { font-size: 15px; font-weight: 700; }

        #chart-area { 
            height: 450px; border-radius: 20px; border: 1px solid var(--border); 
            overflow: hidden; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">🔱 XAUUSD (VANTAGE)</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">₿ BTCUSD (VANTAGE)</button>
        </div>
        
        <div id="price" class="price-display">--</div>
        <div id="signal" class="signal-indicator wait">⏳ SYNCING VANTAGE...</div>
        
        <div class="meta-grid">
            <div class="meta-box"><div class="meta-label" style="color:var(--neon-green)">ENTRY</div><div id="entry" class="meta-val">--</div></div>
            <div class="meta-box"><div class="meta-label" style="color:var(--neon-red)">STOP LOSS</div><div id="sl" class="meta-val">--</div></div>
            <div class="meta-box"><div class="meta-label" style="color:var(--accent-gold)">TARGET 1</div><div id="tp1" class="meta-val">--</div></div>
            <div class="meta-box"><div class="meta-label" style="color:var(--accent-gold)">TARGET 2</div><div id="tp2" class="meta-val">--</div></div>
        </div>
    </div>

    <div id="chart-area"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        function setMode(m){ 
            mode=m; 
            document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn';
            document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn';
            loadChart(); update(); 
        }

        function loadChart() {
            document.getElementById('chart-area').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": mode==='GOLD' ? "VANTAGE:XAUUSD" : "BINANCE:BTCUSDT",
                "interval": "5", "theme": "dark", "container_id": "chart-area", 
                "style": "1", "timezone": "Etc/UTC", "hide_side_toolbar": true, "backgroundColor": "#020617"
            });
        }

        async function update(){
            try {
                const apiSym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${apiSym}`);
                const d = await r.json();
                let p = parseFloat(d.price);

                // Precise Vantage Calibration
                if(mode==='GOLD') {
                    p += 19.48; // Vantage Gold Offset
                } else {
                    p -= 4.22; // Vantage BTC Offset
                }

                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});

                const stats = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${apiSym}`);
                const sData = await stats.json();
                const change = parseFloat(sData.priceChangePercent);
                const sBox = document.getElementById('signal');

                let ent, sl, tp1, tp2;

                if(change > 0.05) {
                    sBox.innerText = '🚀 BUY SIGNAL'; sBox.className = 'signal-indicator buy';
                    ent = p + 0.05; sl = ent - (mode==='GOLD' ? 4.2 : p*0.004); tp1 = ent + (mode==='GOLD' ? 7.5 : p*0.007); tp2 = ent + (mode==='GOLD' ? 12.0 : p*0.011);
                } else if(change < -0.05) {
                    sBox.innerText = '📉 SELL SIGNAL'; sBox.className = 'signal-indicator sell';
                    ent = p - 0.05; sl = ent + (mode==='GOLD' ? 4.2 : p*0.004); tp1 = ent - (mode==='GOLD' ? 7.5 : p*0.007); tp2 = ent - (mode==='GOLD' ? 12.0 : p*0.011);
                } else {
                    sBox.innerText = '⏳ SCANNING...'; sBox.className = 'signal-indicator wait';
                    ent = sl = tp1 = tp2 = 0;
                }

                document.getElementById('entry').innerText = ent === 0 ? '--' : ent.toFixed(2);
                document.getElementById('sl').innerText = sl === 0 ? '--' : sl.toFixed(2);
                document.getElementById('tp1').innerText = tp1 === 0 ? '--' : tp1.toFixed(2);
                document.getElementById('tp2').innerText = tp2 === 0 ? '--' : tp2.toFixed(2);

            } catch(e) { console.log(e); }
        }
        loadChart(); setInterval(update, 2000); update();
    </script>
</body>
</html>
