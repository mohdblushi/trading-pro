<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro V40 - Real-time Flow</title>
    <style>
        :root { --bg: #000000; --card: #050505; --accent: #ffcc00; --up: #00ff88; --down: #ff3333; --brd: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .terminal { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--brd); text-align: center; margin-bottom: 10px; }
        .switcher { display: flex; gap: 10px; margin-bottom: 20px; }
        .s-btn { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--brd); background: #0a0a0a; color: #555; font-weight: bold; cursor: pointer; }
        .s-btn.active { border-color: var(--accent); color: var(--accent); background: #151500; }
        .price-val { font-size: 60px; font-weight: 900; margin: 5px 0; letter-spacing: -2px; }
        .sig-box { padding: 20px; border-radius: 15px; font-size: 26px; font-weight: 900; margin: 20px 0; border: 2px solid var(--brd); text-transform: uppercase; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .buy { color: var(--up); border-color: var(--up); background: rgba(0, 255, 136, 0.05); }
        .sell { color: var(--down); border-color: var(--down); background: rgba(255, 51, 51, 0.05); }
        .wait { color: #555; border-color: var(--brd); font-size: 16px; background: #080808; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .box { background: #080808; padding: 15px; border-radius: 15px; border: 1px solid var(--brd); text-align: left; }
        .label { font-size: 10px; color: #444; font-weight: bold; margin-bottom: 5px; }
        .val { font-size: 18px; font-weight: bold; }
        #tv_chart { height: 400px; border-radius: 20px; border: 1px solid var(--brd); overflow: hidden; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">GOLD MT5</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">BTC MT5</button>
        </div>
        <div id="price" class="price-val">--</div>
        <div id="signal" class="sig-box wait">🔍 SYNCING LIVE...</div>
        <div class="grid">
            <div class="box"><div class="label" style="color:var(--up)">ACCURATE ENTRY</div><div id="entry" class="val">--</div></div>
            <div class="box"><div class="label" style="color:var(--down)">SAFE STOP LOSS</div><div id="sl" class="val">--</div></div>
            <div class="box"><div class="label" style="color:var(--accent)">TARGET PRO 1</div><div id="tp1" class="val">--</div></div>
            <div class="box"><div class="label" style="color:var(--accent)">TARGET PRO 2</div><div id="tp2" class="val">--</div></div>
        </div>
    </div>
    <div id="tv_chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        function setMode(m){ mode=m; document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn'; document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn'; loadChart(); update(); }
        function loadChart() {
            document.getElementById('tv_chart').innerHTML = '';
            new TradingView.widget({ "autosize": true, "symbol": mode==='GOLD' ? "OANDA:XAUUSD" : "BINANCE:BTCUSDT", "interval": "5", "theme": "dark", "container_id": "tv_chart", "style": "1", "hide_side_toolbar": true, "backgroundColor": "#000000" });
        }

        async function update(){
            try {
                const sym = mode === 'GOLD' ? 'PAXGUSDT' : 'BTCUSDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                const d = await r.json();
                let p = parseFloat(d.lastPrice);
                let chg = parseFloat(d.priceChangePercent);

                // Constant Price Sync regardless of signal state
                if(mode==='GOLD') p += 8.12; else p += 1.80;

                // UPDATE PRICE EVERY 2 SECONDS
                document.getElementById('price').innerText = '$' + p.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
                
                const sBox = document.getElementById('signal');
                let ent, sl, tp1, tp2;

                // Strong Entry Filter - Only shows signal when trend is confirmed
                if(chg > 0.30) { 
                    sBox.innerHTML = '🚀 STRONG BUY'; sBox.className = 'sig-box buy';
                    ent = p; sl = ent - (mode==='GOLD' ? 4.5 : 450); tp1 = ent + (mode==='GOLD' ? 8 : 800); tp2 = ent + (mode==='GOLD' ? 15 : 1500);
                } else if(chg < -0.30) {
                    sBox.innerHTML = '📉 STRONG SELL'; sBox.className = 'sig-box sell';
                    ent = p; sl = ent + (mode==='GOLD' ? 4.5 : 450); tp1 = ent - (mode==='GOLD' ? 8 : 800); tp2 = ent - (mode==='GOLD' ? 15 : 1500);
                } else {
                    sBox.innerHTML = '⏳ WAITING FOR TREND...'; sBox.className = 'sig-box wait';
                    ent = sl = tp1 = tp2 = 0;
                }

                document.getElementById('entry').innerText = ent === 0 ? '--' : ent.toFixed(2);
                document.getElementById('sl').innerText = sl === 0 ? '--' : sl.toFixed(2);
                document.getElementById('tp1').innerText = tp1 === 0 ? '--' : tp1.toFixed(2);
                document.getElementById('tp2').innerText = tp2 === 0 ? '--' : tp2.toFixed(2);
            } catch(e) {}
        }
        loadChart(); setInterval(update, 2000); update();
    </script>
</body>
</html>
